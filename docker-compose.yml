version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - ANTHROPIC_API_KEY
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /tmp:/tmp
      - scan_history:/app/data

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=/api
    ports:
      - "8082:80"
    depends_on:
      - backend
    environment:
      - BASIC_AUTH_USER
      - BASIC_AUTH_PASSWORD

volumes:
  scan_history:
