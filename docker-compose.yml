version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock # In case docker scanner is added
      - /tmp:/tmp # For git cloning temp dirs

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=https://api-securescan.techflowlabs.gr
    expose:
      - "8082"
    depends_on:
      - backend
    environment:
      - VITE_API_URL=https://api-securescan.techflowlabs.gr
