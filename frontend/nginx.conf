server {
    listen 80;

    # Scans clone + audit + call Claude twice — they can run for minutes
    client_max_body_size 10m;

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # PR scan endpoint — token auth (X-API-Key) instead of Basic Auth,
    # so GitHub Actions can call it without browser credentials.
    location = /api/scan/pr {
        proxy_pass http://backend:8000/scan/pr;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;

        proxy_connect_timeout 60s;
        proxy_send_timeout    600s;
        proxy_read_timeout    600s;
        proxy_buffering off;
    }

    location /api/ {
        auth_basic "SecureScan";
        auth_basic_user_file /etc/nginx/.htpasswd;
        proxy_pass http://backend:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;

        proxy_connect_timeout 60s;
        proxy_send_timeout    600s;
        proxy_read_timeout    600s;
        proxy_buffering off;
    }
}